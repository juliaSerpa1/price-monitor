version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: price_monitor_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: price_monitor
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: price_monitor_redis
    ports:
      - "6379:6379"